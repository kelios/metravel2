# Общий запуск приложения. На DEV-CLIENT `launchApp` открывает лаунчер Expo (список
# dev-серверов), а не приложение — поэтому опционально тапаем dev-сервер, чтобы подключить
# бандл. На STANDALONE preview/release-сборке этих элементов нет → optional:true пропускает
# шаг, и launchApp сразу открывает приложение. Затем ждём загрузки UI.
appId: by.metravel.app
---
- launchApp
- tapOn:
    text: ".*8081.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Маршруты|Куда поехать|Все квесты"
    timeout: 90000
