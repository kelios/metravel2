# Intro-карта квеста (native-only регресс): карта деталки должна показать точки маршрута до старта.
# Регрессия, которую ловит: Leaflet/WebView показывает тайлы, но не рисует маркеры квеста.
appId: by.metravel.app
---
- runFlow: launch.yaml
- tapOn: "Квесты"
- assertVisible: "Все квесты"
- tapOn:
    text: "Начать приключение.*"
    index: 0
- tapOn: "Сбросить прогресс"
- tapOn: "ОК"
- assertVisible: "0 / 9"
- scrollUntilVisible:
    element:
      text: "Карта квеста"
    direction: DOWN
    timeout: 25000
- assertVisible: "Карта квеста"
- assertVisible: "9 точек на карте"
