- region "Описание городского квеста" [ref=f3e2]:
  - paragraph [ref=f3e3]: Городской квест Metravel
  - 'heading "Квест по Лунинцу: город, который привезла железная дорога" [level=1] [ref=f3e4]'
  - paragraph [ref=f3e5]: "Город Лунинец: бесплатный пеший маршрут «Квест по Лунинцу: город, который привезла железная дорога» по достопримечательностям. 9 точек. Примерно 2 ч. Задания и"
  - paragraph [ref=f3e6]: "Пять с половиной веков Лунинец был крошечной полесской деревней среди болот — в старых бумагах 1449 года его записали как Малый Лунин. Так бы и жил он тихой жизнью, если бы в 1880-х сюда не пришли инженеры с теодолитами: через Полесье решили тянуть железную дорогу."
  - paragraph [ref=f3e7]: "За пару лет — с 1884-го по 1886-й — из Лунинца поехали поезда сразу в четыре стороны: на Вильню, Пинск, Ровно и Гомель. Деревня в одночасье стала узлом: депо с поворотным кругом, ремонтные мастерские, водонапорные башни, станционный посёлок. Железная дорога привезла сюда всё, что есть в этом городе: людей и профессии, храмы двух конфессий, будущего классика белорусской литературы и будущего великого авиаконструктора."
  - paragraph [ref=f3e8]: В этом квесте ты пройдёшь по центру Лунинца и соберёшь эти «посылки железной дороги» одну за другой.
  - paragraph [ref=f3e9]: "Что делать: 1) Читай историю и задание на каждой точке. 2) Находи место по карте. 3) Смотри по сторонам — ответы находятся на месте, а не в интернете."
  - paragraph [ref=f3e10]: Маршрут начинается там же, где начался город, — у вокзала. Вперёд!
  - list [ref=f3e11]:
