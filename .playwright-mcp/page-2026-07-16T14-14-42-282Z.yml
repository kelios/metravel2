                  - button "Что такое городской квест?" [ref=f4e67] [cursor=pointer]:
                    - generic [ref=f4e69]: 
                  - generic [ref=f4e71]: Это пеший маршрут по городу с заданиями и загадками. Вы идёте от точки к точке, читаете короткие истории о местах и отвечаете на вопросы, ответы на которые находятся прямо на улице — на табличках, фасадах и памятниках.
                - generic [ref=f4e72]:
                  - button "Как проходить квест?" [ref=f4e73] [cursor=pointer]:
                    - generic [ref=f4e75]: 
                  - generic [ref=f4e77]: Откройте квест на телефоне и следуйте маршруту. На каждой точке прочитайте легенду, выполните задание и введите ответ, чтобы открыть следующую точку. Карта и подсказки всегда под рукой.
                - generic [ref=f4e78]:
                  - button "Сколько стоит квест?" [ref=f4e79] [cursor=pointer]:
                    - generic [ref=f4e81]: 
                  - generic [ref=f4e83]: Все городские квесты Metravel бесплатны. Не нужно ничего покупать или бронировать — просто выберите маршрут и отправляйтесь гулять.
                - generic [ref=f4e84]:
                  - button "Подходят ли квесты детям?" [ref=f4e85] [cursor=pointer]:
                    - generic [ref=f4e87]: 
                  - generic [ref=f4e89]: "Да. У нас есть отдельные детские квесты с заданиями по возрастам: задания проще, а истории рассчитаны на юных исследователей. Такие маршруты помечены значком «Детский»."
                - generic [ref=f4e90]:
                  - button "Нужна ли регистрация?" [ref=f4e91] [cursor=pointer]:
                    - generic [ref=f4e93]: 
                  - generic [ref=f4e95]: Посмотреть маршруты и начать квест можно без регистрации. Аккаунт нужен только чтобы сохранять прогресс между устройствами и отмечать пройденные квесты.
                - generic [ref=f4e96]:
                  - button "Можно ли проходить офлайн?" [ref=f4e97] [cursor=pointer]:
                    - generic [ref=f4e99]: 
                  - generic [ref=f4e101]: Да. Квест можно заранее скачать, и тогда маршрут, задания и карта будут работать без интернета — удобно в поездках и местах со слабым сигналом.
                - generic [ref=f4e102]:
                  - button "В каких городах есть квесты?" [ref=f4e103] [cursor=pointer]:
                    - generic [ref=f4e105]: 
                  - generic [ref=f4e107]: Квесты есть в Минске и других городах Беларуси, а также в ряде городов Европы. Полный список городов и маршрутов — в каталоге на этой странице.
