                    - generic [ref=f2e173]: 
                - generic [ref=f2e174]: "Пять с половиной веков Лунинец был крошечной полесской деревней среди болот — в старых бумагах 1449 года его записали как Малый Лунин. Так бы и жил он тихой жизнью, если бы в 1880-х сюда не пришли инженеры с теодолитами: через Полесье решили тянуть железную дорогу. За пару лет — с 1884-го по 1886-й — из Лунинца поехали поезда сразу в четыре стороны: на Вильню, Пинск, Ровно и Гомель. Деревня в одночасье стала узлом: депо с поворотным кругом, ремонтные мастерские, водонапорные башни, станционный посёлок. Железная дорога привезла сюда всё, что есть в этом городе: людей и профессии, храмы двух конфессий, будущего классика белорусской литературы и будущего великого авиаконструктора. В этом квесте ты пройдёшь по центру Лунинца и соберёшь эти «посылки железной дороги» одну за другой. Что делать: 1) Читай историю и задание на каждой точке. 2) Находи место по карте. 3) Смотри по сторонам — ответы находятся на месте, а не в интернете. Маршрут начинается там же, где начался город, — у вокзала. Вперёд!"
