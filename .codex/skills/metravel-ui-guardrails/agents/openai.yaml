interface:
  display_name: "Metravel UI Guardrails"
  short_description: "Protect metravel UI, media, and link rules."
  default_prompt: "Use $metravel-ui-guardrails to make a metravel UI change that stays aligned with project rules for links, icons, images, placeholders, tokens, and mobile web/Android/iOS parity, and fixes every real UI issue found in the touched flow. For /places and map/travel points, keep the shared point/place card contract: visible app chrome, ~70% hero, same action order, full expandable navigation (Google, Apple, Organic/offline, Waze, Яндекс Карты, Яндекс Навигатор, OSM), explicit travel status text, and stable incremental place cards."
