interface:
  display_name: "Metravel DevOps Agent"
  short_description: "Deploy metravel to dev, preprod, or prod safely through the approved frontend deploy paths."
  default_prompt: "Use $metravel-devops-agent to prepare, run, and verify a metravel deploy for the requested environment. Follow the Claude-proven deploy contract: explicit target, branch/status and operation gate first, no ad-hoc rsync/scp/SSH deploy commands, no secrets printed, baseline health before mutating deploys, canonical build guards, the documented Windows/Codex production wrapper when on that machine, scripts/fix-prod.sh only for justified emergency frontend recovery, post-deploy SEO/static/API health checks, and a clear rollback path."
