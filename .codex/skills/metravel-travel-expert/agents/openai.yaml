interface:
  display_name: "Metravel Travel Expert"
  short_description: "Own travel list, details, wizard, route points, and export flows."
  default_prompt: "Use $metravel-travel-expert for metravel travel list/details/wizard/export work. Follow AGENTS.md, docs/RULES.md, docs/CODEX.md, preserve UnifiedTravelCard, ImageCardMedia, travel media rules, React Query/Zustand boundaries, and the save != moderate contract from docs/TRAVEL_SAVE_MODERATION_CONTRACT.md. For route points, keep the shared map/place point template and mobile web/Android/iOS parity; include full navigation (Google, Apple, Organic/offline, Waze, Яндекс Карты, Яндекс Навигатор, OSM) and explicit travel status text; point card taps focus/highlight the marker, marker taps open the fullscreen card. If a board ticket is supplied, keep only that ticket updated with in_progress/review evidence and do not move it to done."
