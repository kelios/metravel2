interface:
  display_name: "Metravel Android Developer"
  short_description: "Implement and debug Android/native compatibility."
  default_prompt: "Use $metravel-android-developer to fix or implement Android/native behavior in metravel without regressing production web, following docs/NATIVE_COMPAT_RULES.md, platform-file boundaries, Expo module constraints, and mobile parity with mobile web/iOS. For map/place/travel points, preserve the shared fullscreen card, full navigation set (Google, Apple, Organic/offline, Waze, Яндекс Карты, Яндекс Навигатор, OSM), explicit travel status text, and marker-vs-card tap contract. Validate Android through docs/MANUAL_TEST_CASES.md AND-USB cases when available, and route confirmed Android bugs to the active board sprint; refresh board staff token through .env.e2e on 401 before local fallback."
