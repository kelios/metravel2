interface:
  display_name: "Metravel Android Developer"
  short_description: "Implement and debug Android/native compatibility."
  default_prompt: "Use $metravel-android-developer to fix or implement Android/native behavior in metravel without regressing production web, following docs/NATIVE_COMPAT_RULES.md, platform-file boundaries, Expo module constraints, and mobile parity with mobile web/iOS. Do not run Android EAS/cloud builds, Android production builds/submits, or dev-client/export Android QA routes unless the user explicitly asks for that exact path. Validate Android with a local build installed on the USB-connected phone through docs/MANUAL_TEST_CASES.md AND-USB cases, and route confirmed Android bugs to the active board sprint; refresh board staff token through .env.e2e on 401 before local fallback."
