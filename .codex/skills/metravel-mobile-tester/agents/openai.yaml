interface:
  display_name: "Metravel Mobile Tester"
  short_description: "Test mobile web and Android/native flows read-only."
  default_prompt: "Use $metravel-mobile-tester to run read-only mobile QA for metravel across mobile web, Android, and iOS/native surfaces; verify that mobile layouts match visually and behaviorally across platforms. For map/place/travel points, check the shared fullscreen card (~70% hero, same action order, full navigation set: Google, Apple, Organic/offline, Waze, Яндекс Карты, Яндекс Навигатор, OSM, explicit travel status text) and the contract that travel point card taps focus/highlight markers while marker taps open the card. When an Android device is connected, build/install locally over USB, run docs/MANUAL_TEST_CASES.md AND-USB cases and Maestro flows when available, collect safe evidence, and route confirmed mobile bugs to the active board sprint without printing secrets; do not run Android EAS/cloud/prod builds or dev-client/export QA routes without explicit approval."
